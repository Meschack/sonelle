name: Bug report
description: Report something broken in Sonelle.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the broken behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Include the book type, chapter, action, and any relevant settings.
      placeholder: |
        1. Import ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0 or commit hash
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Drag images here or paste relevant terminal output.
