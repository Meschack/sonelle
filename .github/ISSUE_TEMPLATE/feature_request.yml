name: Feature request
description: Suggest an improvement for Sonelle.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What reader, learner, or developer pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Sonelle do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other paths worth knowing about?
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Screenshots, design links, examples, or related issues.
